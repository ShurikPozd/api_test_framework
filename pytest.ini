[pytest]
# Маркеры для тестов
markers =
    smoke: Дымовые тесты (быстрая проверка)
    regression: Регрессионные тесты
    positive: Позитивные тесты
    negative: Негативные тесты
    contract: Контрактные тесты
    slow: Медленные тесты

# Параметры запуска
addopts = 
    -v
    --tb=short
    --strict-markers
    --maxfail=5
    --alluredir=reports/allure-results

# Пути для тестов
testpaths = tests

# Игнорируемые папки
norecursedirs = 
    .git
    venv
    __pycache__
    logs
    reports

# Логирование
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s - %(levelname)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S